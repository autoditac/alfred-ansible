---
all:
  children:
    mowers:
      hosts:
        batman:
          ansible_host: batman.local
          ansible_user: pi
          alfred_board: rpi4       # rpi4 | bananapi
          alfred_mcu: main         # main | perimeter
          alfred_packages:
            - podman
            - openocd
            - libgpiod3
          alfred_sunray_image_tag: beta
          alfred_dashboard_image_tag: beta
          alfred_safe_update_on_calendar: hourly
          alfred_enable_security_updates: true
          alfred_dock_lat: 54.89599928
          alfred_dock_lon: 9.56558693
