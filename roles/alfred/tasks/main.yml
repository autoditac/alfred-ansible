---
- name: Install system packages
  ansible.builtin.apt:
    name: "{{ alfred_packages }}"
    state: present
    update_cache: true
  tags: [packages]

# --- OS tuning ---

- name: Deploy CPU performance governor service
  ansible.builtin.copy:
    src: cpu-performance.service
    dest: /etc/systemd/system/cpu-performance.service
    mode: "0644"
  notify: Reload systemd
  tags: [tuning]

- name: Enable CPU performance governor service
  ansible.builtin.systemd:
    name: cpu-performance.service
    enabled: true
    state: started
    daemon_reload: true
  tags: [tuning]

- name: Set vm.swappiness via sysctl
  ansible.builtin.copy:
    content: "vm.swappiness={{ alfred_vm_swappiness }}\n"
    dest: /etc/sysctl.d/99-sunray.conf
    mode: "0644"
  notify: Reload sysctl
  tags: [tuning]

- name: Ensure boot config lines are present
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    line: "{{ item }}"
    state: present
  loop: "{{ alfred_boot_config_lines }}"
  tags: [tuning]

- name: Disable WiFi power save via NetworkManager
  ansible.builtin.copy:
    content: |
      [connection]
      wifi.powersave = 2
    dest: /etc/NetworkManager/conf.d/wifi-powersave.conf
    mode: "0644"
  notify: Restart NetworkManager
  tags: [tuning]

- name: Set WiFi band preference
  ansible.builtin.command:
    cmd: nmcli con modify preconfigured 802-11-wireless.band {{ alfred_wifi_band }}
  changed_when: true
  notify: Restart NetworkManager
  tags: [tuning]

- name: Set WiFi regulatory domain in kernel cmdline
  ansible.builtin.replace:
    path: /boot/firmware/cmdline.txt
    regexp: 'cfg80211\.ieee80211_regdom=\S+'
    replace: "cfg80211.ieee80211_regdom={{ alfred_wifi_regdomain }}"
  tags: [tuning]

- name: Deploy WiFi LED indicator service
  ansible.builtin.copy:
    src: wifi-led.service
    dest: /etc/systemd/system/wifi-led.service
    mode: "0644"
  notify: Reload systemd
  tags: [tuning]

- name: Enable WiFi LED indicator service
  ansible.builtin.systemd:
    name: wifi-led.service
    enabled: true
    state: started
    daemon_reload: true
  tags: [tuning]

# --- OpenOCD / MCU ---

- name: Create MCU directory
  ansible.builtin.file:
    path: "{{ alfred_mcu_dir }}"
    state: directory
    owner: pi
    group: pi
    mode: "0755"
  tags: [openocd, firmware]

- name: Deploy OpenOCD configs
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ alfred_mcu_dir }}/{{ item | replace('.j2', '') }}"
    owner: pi
    group: pi
    mode: "0644"
  loop:
    - swd-pi.ocd.j2
    - flash.ocd.j2
    - save-firmware.ocd.j2
  tags: [openocd]

- name: Deploy Quadlet container files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ alfred_quadlet_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - cassandra.container
  notify: Reload systemd
  tags: [services]

- name: Deploy templated Alfred Dashboard Quadlet
  ansible.builtin.template:
    src: alfred-dashboard.container.j2
    dest: "{{ alfred_quadlet_dir }}/alfred-dashboard.container"
    mode: "0644"
  notify: Reload systemd
  tags: [services]

- name: Deploy templated Sunray Quadlet
  ansible.builtin.template:
    src: sunray.container.j2
    dest: "{{ alfred_quadlet_dir }}/sunray.container"
    mode: "0644"
  notify: Reload systemd
  tags: [services]

- name: Create CaSSAndRA data directory
  ansible.builtin.file:
    path: /home/pi/.cassandra
    state: directory
    owner: pi
    group: pi
    mode: "0755"
  tags: [services]

- name: Ensure all services are enabled and started
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - sunray.service
    - cassandra.service
    - alfred-dashboard.service
  tags: [services]

- name: Deploy alfred-safe-update script
  ansible.builtin.copy:
    src: alfred-safe-update.sh
    dest: /usr/local/bin/alfred-safe-update
    mode: "0755"
  tags: [services]

- name: Deploy alfred-safe-update systemd units
  ansible.builtin.copy:
    src: alfred-safe-update.service
    dest: /etc/systemd/system/alfred-safe-update.service
    mode: "0644"
  notify: Reload systemd
  tags: [services]

- name: Deploy templated alfred-safe-update timer
  ansible.builtin.template:
    src: alfred-safe-update.timer.j2
    dest: /etc/systemd/system/alfred-safe-update.timer
    mode: "0644"
  notify: Reload systemd
  tags: [services]

- name: Disable default podman auto-update timer
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    enabled: false
    state: stopped
  failed_when: false
  tags: [services]

- name: Enable alfred-safe-update timer
  ansible.builtin.systemd:
    name: alfred-safe-update.timer
    enabled: true
    state: started
    daemon_reload: true
  tags: [services]

# MCU firmware flash (optional — only when binary is provided)
- name: Copy firmware binary
  ansible.builtin.copy:
    src: "{{ alfred_firmware_bin }}"
    dest: "{{ alfred_mcu_dir }}/rm18.ino.bin"
    mode: "0644"
  when: alfred_firmware_bin | length > 0
  tags: [firmware]

- name: Backup current MCU firmware
  ansible.builtin.command:
    cmd: >-
      openocd
      -f {{ alfred_mcu_dir }}/swd-pi.ocd
      -f {{ alfred_mcu_dir }}/save-firmware.ocd
  when: alfred_firmware_bin | length > 0
  tags: [firmware]

- name: Stop sunray for MCU flash
  ansible.builtin.systemd:
    name: sunray.service
    state: stopped
  when: alfred_firmware_bin | length > 0
  tags: [firmware]

- name: Flash MCU firmware
  ansible.builtin.command:
    cmd: >-
      openocd
      -f {{ alfred_mcu_dir }}/swd-pi.ocd
      -f {{ alfred_mcu_dir }}/flash.ocd
  when: alfred_firmware_bin | length > 0
  tags: [firmware]

- name: Start sunray after MCU flash
  ansible.builtin.systemd:
    name: sunray.service
    state: started
  when: alfred_firmware_bin | length > 0
  tags: [firmware]
